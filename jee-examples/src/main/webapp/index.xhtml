<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Index</title>
    </h:head>
    <h:body>
        <h:link outcome="exception-pages">Exception Page</h:link>
        <p/>

        <p/>
        <h:link outcome="view-users">View Users</h:link>

        <br/>

        <h:form id="parametersForm">

            <h:outputLabel for="defaultCursorPagination" value="Enable Default Cursor Pagination:" />
            <h:selectBooleanCheckbox id="defaultCursorPagination" value="#{lazyModelParameters.defaultCursorPagination}">
                <f:ajax execute="@this" render="@form" />
            </h:selectBooleanCheckbox>
        </h:form>
    </h:body>
</html>
